mode_info:
  name: "Mode 0"
  display_name: "Mode 0"
  description: "Mode similar to Jaco's control mode"
  default_image: "Mode_0.png"

button_mappings:
  B1:
    axes:
      - control_name: "cartesian_X"
        joystick_axis: "ax1"
        direction: 1
        scale: 0.1  
      - control_name: "cartesian_Y"
        joystick_axis: "ax2"
        direction: -1
        scale: 0.1
    button:
      - long_click: "A1"
      - short_click: "B2"
    image: "B1_simple.png"
      
  B2:
    axes:
      - control_name: "joint_6"
        joystick_axis: "ax1"
        direction: 1
        scale: 0.1 
      - control_name: "joint_5"
        joystick_axis: "ax2"
        direction: -1
        scale: 0.1
    button:
      - long_click: ""
      - short_click: "B3"
    image: "B2_simple.png"
  
  B3:
    axes:
      - control_name: "cartesian_Z"
        joystick_axis: "ax1"
        direction: 1
        scale: 0.1
      - control_name: "joint_3"
        joystick_axis: "ax2"
        direction: -1
        scale: 0.1
    button:
      - long_click: ""
      - short_click: "B1"
    image: "B3_simple.png"

  A1:
    axes:
      - control_name: ""
        joystick_axis: ""
        direction: 0
        scale: 0.0
      - control_name: "change_speed"
        joystick_axis: "ax2"
        direction: 1
        scale: 1.0
    button:
      - long_click: ""
      - short_click: "B1"
    image: "A1_simple.png"
    