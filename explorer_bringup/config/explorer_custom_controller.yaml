controller_manager:
  ros__parameters:
    update_rate: 500  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    explorer_custom_controller:
      type: explorer_command_controllers/CustomController

explorer_custom_controller:
