controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    explorer_controller:
      type: ros2_control_explorer/RobotController

    forward_position_controller:
      type: forward_command_controller/ForwardCommandController

    joint_trajectory_controller:
      type: "joint_trajectory_controller/JointTrajectoryController"

    gripper_controller:
      type: forward_command_controller/ForwardCommandController

explorer_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6

    command_interfaces:
      - position
      - velocity

    state_interfaces:
      - position
      - velocity

forward_position_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
      - right_finger_joint
    interface_name: position

joint_trajectory_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity
    open_loop_control: true

    allow_integration_in_goal_trajectories: true

gripper_controller:
  ros__parameters:
    joints:
      - right_finger_joint
    interface_name: position

explorer_comm:
  ros__parameters:
    can_port: 'vxcan1'
    can_id: 40
    # ROS <=> VESC Mappings
    #vesc_joints_can_ids:  [11,        12,         13,         14,         15,         16,         16                  ]
    #vesc_joint_names:     ['joint_1', 'joint_2',  'joint_3',  'joint_4',  'joint_5',  'joint_6',  'right_finger_joint']
    #vesc_joint_types:     ['motor',   'motor',    'motor',    'motor',    'motor',    'motor',    'servo'             ]
    max_pos_setpoint_step: 7.0 #deg
