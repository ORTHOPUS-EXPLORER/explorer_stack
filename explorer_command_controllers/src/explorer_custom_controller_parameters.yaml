explorer_custom_controller:
  simulation: {
        type: bool,
        description: "Simulation enabled / disable (will be set automatically according to launch parameter 'simulation')",
        default_value: false
  }
  joints: {
    type: string_array,
    default_value: [],
    description: "",
    read_only: true,
    validation: {
      unique<>: null,
      not_empty<>: null,
    }
  }
  settings:
    __map_joints:
      mode: {
        type: string,
        description: "Joint mode: effort / position / velocity",
        validation: {
          one_of<>: [["effort", "position", "velocity"]]
        }
      }
      command_interface_names: {
        type: string_array,
        default_value: [],
        description: "Names of the command interfaces to claim",
      }
      state_interface_names: {
        type: string_array,
        default_value: [],
        description: "Names of the state interfaces to claim",
      }
      impedance_damping: {
        type: double,
        description: "Impedance damping"
      }
      impedance_stiffness: {
        type: double,
        description: "Impedance stiffness"
      }
      enable_limits: { type: bool, default_value: true }
      position_command_min:  { type: double }
      position_command_max:  { type: double }
      position_step_max: { type: double }
      # position_command_init_value: { type: double, default_value: 0.0 }
      # ref_mult:  { type: double , default_value: 1.0 }