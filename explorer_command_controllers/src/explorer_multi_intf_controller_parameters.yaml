explorer_multi_intf_controller:
  joints: {
    type: string_array,
    default_value: [],
    description: "",
    read_only: true,
    validation: {
      unique<>: null,
      not_empty<>: null,
    }
  }
  settings:
    __map_joints:
      state: {
        type: string,
        description: "State interface: position/velocity/effort"
      }
      command: {
        type: string,
        description: "Control interface: position/velocity/effort"
      }
      enable_limits: { type: bool, default_value: true }
      cmd_init_value: { type: double, default_value: 0.0 }
      cmd_init_from_state: { type: bool, default_value: false }
      cmd_min:  { type: double }
      cmd_max:  { type: double }
      ref_mult:  { type: double , default_value: 1.0 }
      step_max: { type: double }
